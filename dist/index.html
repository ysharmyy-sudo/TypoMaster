ry Level examination every year to recruit candidates for various posts in government departments and ministries. The examination is conducted in multiple stages including a computer based test and a skill test. The skill test for the post of Lower Division Clerk requires candidates to type at a minimum speed of thirty five words per minute on a computer in English or thirty words per minute in Hindi. For the post of Data Entry Operator the candidate has to perform data entry of eight thousand key depressions per hour. The typing test is conducted on a personal computer and candidates are required to type a given passage within the specified time limit. The accuracy of typing is measured by calculating the number of correct words typed per minute. Errors and corrections are penalised during the evaluation process. Candidates must practice regularly to achieve the required speed and accuracy. The government provides a standardized format for the typing test and all candidates are evaluated under the same conditions. Regular practice on a keyboard following proper finger placement techniques can significantly improve typing speed over a period of time. Aspirants should focus on both speed and accuracy as both are important for clearing the typing test. The test is qualifying in nature and marks are not counted in the final merit list but clearing it is mandatory for appointment to the advertised post in the organization."},{id:"ssc-cgl-deo",name:"SSC CGL – DEO",fullName:"Staff Selection Commission – Combined Graduate Level (Data Entry Operator)",badge:"SSC",badgeColor:"#1d4ed8",post:"Data Entry Operator",required_wpm:27,key_per_hour:8e3,time_minutes:15,language:"English",category:"Central Govt",description:"Data Entry speed of 8000 key depressions per hour required. Approximately 27 WPM.",passage:"India is a country with a rich heritage and culture that spans thousands of years. The history of the Indian subcontinent is one of the oldest in the world with evidence of human habitation dating back to prehistoric times. The Indus Valley Civilization which flourished around four thousand years ago was one of the earliest urban civilizations in the world. After independence in nineteen forty seven India adopted a democratic form of government based on the principles of equality liberty fraternity and justice. The Constitution of India which came into force on the twenty sixth of January nineteen fifty is one of the longest written constitutions in the world. India is a federal republic with a parliamentary form of government at both the central and state levels. The President of India is the constitutional head of the country while the Prime Minister is the head of government. The Parliament of India consists of two houses namely the Lok Sabha and the Rajya Sabha. India has made significant progress in various fields including science technology agriculture and space exploration since independence. The Indian Space Research Organisation has successfully launched numerous satellites and space missions making India one of the leading space faring nations in the world. India is also known for its advancements in information technology software development and digital services. The country has a diverse population with multiple languages religions and cultures coexisting peacefully. Hindi is the official language of the union but there are twenty two scheduled languages recognized by the Constitution of India."},{id:"ssc-steno-d",name:"SSC Stenographer – Grade D",fullName:"Staff Selection Commission – Stenographer Grade D",badge:"SSC",badgeColor:"#1d4ed8",post:"Stenographer Grade D",required_wpm:35,time_minutes:50,language:"English",category:"Central Govt",description:"Typing test (transcription) at 35 WPM. Dictation at 80 WPM, transcription time 50 minutes.",passage:"The government of India has taken several initiatives to promote digital literacy and e-governance across the country. Under the Digital India programme various services have been made available online to citizens so that they do not have to visit government offices for routine work. The programme aims to transform India into a digitally empowered society and knowledge economy. Several departments have launched mobile applications and web portals for the convenience of citizens. The National e-Governance Plan has been instrumental in implementing electronic service delivery at the grass root level throughout the country. Aadhaar the unique identification number issued by the Unique Identification Authority of India has enabled better targeting of government subsidies and benefits to deserving beneficiaries. The direct benefit transfer scheme has helped in eliminating middlemen and ensuring that benefits reach directly to the bank accounts of beneficiaries. The government has also taken steps to ensure that every citizen has access to banking services through the Pradhan Mantri Jan Dhan Yojana. Financial inclusion is an important objective of the government and significant progress has been made in this direction over the past few years. Millions of bank accounts have been opened under this scheme enabling people to access formal financial services for the first time. The success of these programmes demonstrates the potential of technology in improving governance and delivering services to citizens in an efficient and transparent manner at all levels of government."},{id:"ssc-steno-c",name:"SSC Stenographer – Grade C",fullName:"Staff Selection Commission – Stenographer Grade C",badge:"SSC",badgeColor:"#1d4ed8",post:"Stenographer Grade C",required_wpm:40,time_minutes:35,language:"English",category:"Central Govt",description:"Transcription typing at 40 WPM. Dictation at 100 WPM for 7 minutes, transcription 35 minutes.",passage:"Education is the most powerful weapon which you can use to change the world. The right to education is a fundamental right of every child in India and the government has taken various steps to ensure that every child gets access to quality education. The Right to Education Act passed in two thousand nine made education compulsory for children between the ages of six and fourteen years. Under this act private schools are required to reserve twenty five percent of their seats for children from economically weaker sections of society. The mid-day meal scheme has been instrumental in increasing school enrolment and reducing dropout rates especially among children from poor families. The scheme provides nutritious meals to children in government schools thereby addressing the problem of hunger and malnutrition among school going children. Higher education in India has also undergone significant changes with the introduction of the New Education Policy in twenty twenty. The policy aims to transform the education system in India by promoting multidisciplinary learning research and innovation at all levels. Several new institutions of national importance have been established to promote excellence in higher education and research. The government has also launched various scholarships and fellowship programmes to support talented students from underprivileged backgrounds. Digital education has gained importance especially after the pandemic which forced educational institutions to adopt online modes of teaching and learning. The National Digital Education Architecture aims to create a comprehensive digital infrastructure for education in the country to ensure continuity of learning for all students."},{id:"rrb-ntpc",name:"RRB NTPC",fullName:"Railway Recruitment Board – Non Technical Popular Categories",badge:"RRB",badgeColor:"#7c3aed",post:"Junior Clerk / Junior Account Assistant / Junior Time Keeper",required_wpm:35,time_minutes:10,language:"English",category:"Railway",description:"Typing test for clerical posts in Indian Railways. 35 WPM in English required.",passage:"Indian Railways is one of the largest railway networks in the world and plays a vital role in the transportation of passengers and goods across the length and breadth of the country. It is owned and operated by the Government of India through the Ministry of Railways. The Indian Railways was first established during the British colonial period with the first train running between Mumbai and Thane in eighteen fifty three. Since then the network has expanded significantly and today it covers a distance of over sixty seven thousand kilometres with more than thirteen thousand stations across the country. Indian Railways employs over thirteen lakh employees making it one of the largest employers in the world. The railway system is divided into several zones each managed by a zonal railway headquarter. The zones are further divided into divisions for administrative purposes. Indian Railways has been modernising its infrastructure and services over the years with the introduction of high speed trains improved passenger amenities and advanced signalling systems. The introduction of the Vande Bharat Express trains has been a major step in upgrading the quality of rail travel in India. The Dedicated Freight Corridor project aims to separate freight traffic from passenger traffic on major routes to improve the efficiency of goods transportation. Indian Railways also contributes significantly to the national economy by transporting raw materials finished goods and agricultural produce across the country. The railway network connects major cities and towns with remote areas providing an affordable mode of transport to millions of people every day throughout the year."},{id:"cpct",name:"CPCT",fullName:"Computer Proficiency Certification Test (Madhya Pradesh)",badge:"MP",badgeColor:"#0f766e",post:"Various MP Govt Posts requiring computer proficiency",required_wpm:30,time_minutes:15,language:"English",category:"State Govt – MP",description:"MP government mandatory test. 30 WPM English or 20 WPM Hindi. Required for most MP Govt jobs.",passage:"Madhya Pradesh is the second largest state of India by area and is located in the central part of the country. The state is known for its rich natural resources forests wildlife and cultural heritage. Bhopal the capital of Madhya Pradesh is known as the city of lakes owing to the presence of many beautiful lakes in and around the city. The state has a diverse geography ranging from the Vindhya and Satpura ranges to the fertile plains of the Narmada valley. Agriculture is the primary occupation of the majority of the population of Madhya Pradesh with wheat soybean and pulses being the major crops grown in the state. The state is also rich in mineral resources including coal diamonds copper manganese and limestone. Madhya Pradesh is known as the heart of India due to its central location in the country. The state has a rich cultural heritage with several UNESCO world heritage sites including Khajuraho the Buddhist monuments at Sanchi and the rock shelters of Bhimbetka. The state government has been working on various development projects to improve the standard of living of its citizens. Infrastructure development in the form of roads bridges and urban development has been given priority. The tourism sector has been identified as a major driver of economic growth and the state government has been promoting various tourist destinations. Wildlife tourism is particularly popular with several national parks and tiger reserves attracting visitors from across the country and abroad. Kanha Bandhavgarh Pench and Panna are some of the famous tiger reserves in Madhya Pradesh that are home to a large number of tigers and other wildlife."},{id:"dsssb",name:"DSSSB",fullName:"Delhi Subordinate Services Selection Board",badge:"DELHI",badgeColor:"#b45309",post:"Junior Clerk / Steno / PA / LDC",required_wpm:35,time_minutes:10,language:"English",category:"State Govt – Delhi",description:"Typing test for Delhi government posts. 35 WPM English or 30 WPM Hindi required.",passage:"Delhi the national capital territory of India is the political and administrative centre of the country. It is one of the most densely populated cities in the world and serves as the seat of the government of India. Delhi has a rich history spanning several centuries and has been the capital of various empires and dynasties. The city is home to numerous historical monuments and heritage sites including the Red Fort Qutub Minar Humayun Tomb and India Gate. The Red Fort which was built by the Mughal Emperor Shah Jahan in the seventeenth century is a symbol of Indian heritage and is used for the Independence Day celebrations every year. The government of Delhi provides various services to its citizens through multiple departments and agencies. The Delhi government has been working on improving the quality of life of its residents through various social welfare schemes and infrastructure development projects. The city has a well-developed public transport system including the Delhi Metro which is one of the largest and busiest metro systems in Asia. The metro has revolutionised public transportation in Delhi making it more convenient affordable and environmentally friendly for millions of commuters. Delhi is also a major centre for commerce trade industry and education with numerous universities colleges and research institutions located in the city. The city attracts migrants from all parts of India in search of employment and better opportunities. The government of Delhi has been working to ensure that basic amenities such as water electricity and housing are available to all its residents including those living in unauthorized colonies and slums."},{id:"highcourt-steno",name:"High Court Stenographer",fullName:"Various High Courts – Stenographer / Personal Assistant",badge:"HC",badgeColor:"#be123c",post:"Stenographer / Personal Assistant",required_wpm:40,time_minutes:10,language:"English",category:"Judiciary",description:"Typing test for High Court steno posts. 40 WPM required. Judiciary standard passages.",passage:"The judiciary is one of the three pillars of democracy and plays a crucial role in upholding the rule of law and protecting the rights of citizens. The Supreme Court of India is the apex court of the country and its decisions are binding on all courts in India. The High Courts exercise original appellate and supervisory jurisdiction in their respective states and union territories. The district courts and subordinate courts form the lower tier of the judiciary and deal with the majority of cases filed by citizens. The Constitution of India guarantees the independence of the judiciary and provides for the separation of powers between the executive legislature and judiciary. Judges of the Supreme Court and High Courts are appointed by the President of India in consultation with the Chief Justice of India. The process of appointment of judges is an important aspect of judicial independence and there have been discussions about making the process more transparent and accountable. Access to justice is a fundamental right and the legal aid system provides assistance to those who cannot afford legal representation. The National Legal Services Authority and State Legal Services Authorities provide free legal aid to eligible persons including women children scheduled castes and scheduled tribes. Alternative dispute resolution mechanisms such as Lok Adalat mediation and arbitration have been promoted to reduce the burden on courts and provide quick and affordable justice to litigants. The digitisation of court records and the implementation of the e-Courts project have improved the efficiency of the judicial system and made it more accessible to citizens across the country."},{id:"up-police-operator",name:"UP Police Computer Operator",fullName:"Uttar Pradesh Police – Computer Operator Grade A & B",badge:"UP",badgeColor:"#065f46",post:"Computer Operator Grade A / Grade B",required_wpm:25,time_minutes:10,language:"English",category:"State Govt – UP",description:"Typing test for UP Police computer operator posts. 25 WPM English required.",passage:"The Uttar Pradesh Police is one of the largest police forces in India and is responsible for maintaining law and order in the most populous state of the country. The police force is headed by the Director General of Police and is organised into various zones ranges and districts for administrative and operational purposes. The state police works under the overall supervision of the state government and is supported by various specialised units including the crime branch anti-terrorism squad and special task force. The Uttar Pradesh Police has been working on modernising its infrastructure and adopting new technologies to improve its efficiency and effectiveness. The implementation of the digital police portal has made it easier for citizens to register complaints and access police services without visiting the police station. The e-FIR system allows citizens to register first information reports online saving time and reducing the inconvenience of visiting the police station. The state police has also been strengthening its cyber crime unit to deal with the increasing number of crimes committed using digital technology. Community policing initiatives have been launched to build trust between the police and the public and to involve citizens in crime prevention activities. The police force has been working on improving the response time to emergency calls and ensuring that help reaches citizens in distress quickly. The establishment of dial one hundred emergency service has been an important step in this direction. The state government has also been working on improving the welfare and training of police personnel to enhance their capacity to serve the public effectively."},{id:"ibps-clerk",name:"IBPS Clerk – DEO",fullName:"Institute of Banking Personnel Selection – Clerk (Data Entry)",badge:"BANK",badgeColor:"#1e40af",post:"Clerk (Data Entry Operator – Banks)",required_wpm:30,time_minutes:10,language:"English",category:"Banking",description:"Typing / data entry component for banking clerical posts. 30 WPM required.",passage:"Banking is the backbone of the financial system of any country and plays a vital role in mobilising savings and channelling them into productive investments. The banking sector in India has undergone significant transformation over the past few decades with the introduction of economic reforms and liberalisation. The Reserve Bank of India is the central bank of the country and is responsible for regulating the monetary policy and overseeing the functioning of all banks in India. Public sector banks private sector banks regional rural banks cooperative banks and foreign banks form the banking landscape of India. The nationalisation of major banks in nineteen sixty nine was a landmark event in the history of Indian banking and helped extend banking services to rural areas and to the masses. The introduction of core banking solutions has enabled banks to provide seamless services to their customers across all branches in India and abroad. Internet banking and mobile banking have revolutionised the way people access banking services allowing them to conduct transactions from the comfort of their homes. The Unified Payments Interface has transformed the digital payments landscape in India making real time fund transfers quick and convenient. The number of digital transactions in India has grown exponentially over the past few years reflecting the increasing adoption of digital payment methods by the people. The financial inclusion agenda of the government has been supported by the banking sector through the opening of bank accounts under the Pradhan Mantri Jan Dhan Yojana scheme. Banks have also been extending credit to small and medium enterprises farmers and self help groups to promote economic development and entrepreneurship at the grass root level across the country."},{id:"income-tax-ta",name:"Income Tax – Tax Assistant",fullName:"Income Tax Department – Tax Assistant / Steno",badge:"IT",badgeColor:"#1d4ed8",post:"Tax Assistant / Multi-Tasking Staff",required_wpm:35,time_minutes:10,language:"English",category:"Central Govt",description:"SSC CGL/CHSL route for Income Tax Dept. 35 WPM English typing test.",passage:"The Income Tax Department of India is responsible for administering the direct tax laws in the country and for collecting income tax from individuals companies and other entities. The department functions under the Central Board of Direct Taxes which is a statutory body functioning under the Department of Revenue in the Ministry of Finance. Income tax was first introduced in India during the British period and the current Income Tax Act was enacted in nineteen sixty one. The tax system in India has been undergoing reforms to make it simpler more transparent and taxpayer friendly. The introduction of the Annual Information Statement has made it easier for taxpayers to verify their tax information and file accurate returns. The e-filing portal of the Income Tax Department allows taxpayers to file their income tax returns online from the comfort of their homes. The department has been working on improving its services to taxpayers through various digital initiatives and by reducing the compliance burden on honest taxpayers. The faceless assessment scheme introduced in recent years has eliminated the need for taxpayers to visit income tax offices for routine matters. Under this scheme assessments are conducted online and the identity of the assessing officer is not revealed to the taxpayer ensuring transparency and fairness. The income tax department has also been strengthening its data analytics capabilities to detect tax evasion and ensure that all taxable income is captured and taxed appropriately. Widening the tax base and improving tax compliance are important objectives of the department and various measures have been taken to achieve these goals including the use of technology and data sharing between different government agencies."},{id:"epfo-steno",name:"EPFO Stenographer",fullName:"Employees' Provident Fund Organisation – Stenographer",badge:"EPFO",badgeColor:"#7c3aed",post:"Stenographer / Social Security Assistant",required_wpm:35,time_minutes:10,language:"English",category:"Central Govt",description:"Typing test for EPFO steno posts conducted via SSC. 35 WPM required.",passage:"The Employees Provident Fund Organisation is a statutory body under the Ministry of Labour and Employment Government of India. It is one of the largest social security organisations in the world in terms of the number of members and the volume of financial transactions undertaken. The EPFO administers a number of schemes for the benefit of workers in the organised sector including the Employees Provident Fund Scheme the Employees Pension Scheme and the Employees Deposit Linked Insurance Scheme. These schemes provide social security benefits to workers and their families in the form of provident fund pension and insurance. The provident fund is a savings scheme under which both the employer and the employee contribute a percentage of the employee salary every month. The accumulated fund with interest is paid to the employee at the time of retirement or under other specified circumstances. The pension scheme provides monthly pension to employees and their family members after retirement or death. The insurance scheme provides a lump sum payment to the nominee of a member in case of death while in service. The EPFO has been working on modernising its operations and improving services to members and employers through the use of technology. The Universal Account Number allows members to manage their provident fund accounts seamlessly even when they change jobs. Members can view their account balance submit claims and check the status of their claims online through the member portal. The introduction of the composite claim form and the facility to submit claims online has significantly reduced the time taken to settle claims and has improved the overall experience of members interacting with the organisation."},{id:"bihar-ssc",name:"Bihar SSC – Typist",fullName:"Bihar Staff Selection Commission – Lower Division Clerk / Typist",badge:"BSSC",badgeColor:"#0f766e",post:"Lower Division Clerk / Typist",required_wpm:30,time_minutes:10,language:"English",category:"State Govt – Bihar",description:"Bihar state government typing test. 30 WPM English or 25 WPM Hindi required.",passage:"Bihar is one of the oldest and most historically significant states of India located in the eastern part of the country. The state is known for its rich cultural heritage and has been the birthplace of several great religions philosophies and empires. Pataliputra the ancient capital of the Maurya Empire and now known as Patna is the capital city of Bihar. The state has a largely agrarian economy with agriculture being the primary occupation of the majority of its population. Rice wheat maize and sugarcane are the major crops grown in Bihar. The state is also known for its production of vegetables and fruits particularly litchi which is grown in the northern districts bordering Nepal. Bihar has made significant strides in governance and development over the past two decades with improvements in law and order infrastructure and social development indicators. The government has been implementing various schemes for the welfare of the people including those related to education health and social protection. The construction of roads and bridges has improved connectivity between different parts of the state making it easier for people to access markets educational institutions and health facilities. The Nitish Kumar government launched the Mukhyamantri Cycle Yojana and Mukhyamantri Kanya Utthan Yojana which helped increase the enrolment of girls in schools across the state. Bihar has a young population which represents both a challenge and an opportunity for the state government. Creating employment opportunities for the youth is one of the key priorities of the state government and various initiatives have been launched to promote skill development and entrepreneurship among young people in the state."},{id:"raj-subordinate",name:"Rajasthan LDC / Typist",fullName:"Rajasthan Staff Selection Board – LDC / Typist / Junior Assistant",badge:"RSSB",badgeColor:"#b45309",post:"LDC / Typist / Junior Assistant",required_wpm:35,time_minutes:10,language:"English",category:"State Govt – Rajasthan",description:"RSSB typing test for Rajasthan state services. 35 WPM English or 30 WPM Hindi.",passage:"Rajasthan is the largest state of India by area and is located in the northwestern part of the country. The state is known for its majestic forts palaces sand dunes and vibrant culture. The Thar Desert which covers a large part of western Rajasthan is one of the largest deserts in the world and is home to a unique ecosystem with a diverse range of flora and fauna. The capital city of Rajasthan is Jaipur which is also known as the Pink City due to the colour of its buildings. Jaipur is famous for its stunning architecture including the Hawa Mahal City Palace and Jantar Mantar which is a UNESCO world heritage site. The economy of Rajasthan is largely based on agriculture mineral resources and tourism. Agriculture is the primary occupation of the majority of the rural population with crops like wheat bajra jowar and mustard being cultivated in the state. Rajasthan is rich in mineral resources including marble sandstone limestone zinc lead and copper. The marble quarried in Makrana district was used in the construction of the famous Taj Mahal in Agra. Tourism is a major industry in Rajasthan attracting millions of domestic and international tourists every year. The forts and palaces of Rajasthan including the Amber Fort Mehrangarh Fort and Jaisalmer Fort are major tourist attractions. The state government has been working on developing tourist infrastructure and promoting Rajasthan as a premier tourist destination. The rich folk culture of Rajasthan including its music dance and handicrafts are an important part of the tourism offer of the state."},{id:"mp-patwari",name:"MP Patwari / Sachivalaya",fullName:"Madhya Pradesh Sachivalaya / Patwari Computer Proficiency Test",badge:"MP",badgeColor:"#0f766e",post:"Patwari / Sachivalaya Sahayak / Data Entry Operator",required_wpm:20,time_minutes:10,language:"English",category:"State Govt – MP",description:"MP state typing test via CPCT. 20 WPM Hindi or English required for lower posts.",passage:"The state of Madhya Pradesh has been making rapid progress in the field of digital governance and e-services. The government has been implementing several important schemes for the welfare of farmers rural communities and urban poor. The Chief Minister's schemes for housing education health and employment generation have benefited millions of citizens across the state. Agriculture is the backbone of the economy of Madhya Pradesh and the state government has been working to improve the condition of farmers through better irrigation facilities crop insurance schemes and provision of quality seeds and fertilisers at subsidised rates. The Pradhan Mantri Fasal Bima Yojana has been implemented effectively in the state and has provided financial protection to farmers against crop losses due to natural calamities pests and diseases. The state has also been working on improving water conservation and management through watershed development programmes and the construction of check dams small ponds and other water harvesting structures. The Narmada river which originates in Madhya Pradesh is a lifeline for millions of people in the state and the country. Several large dams have been constructed on the Narmada and its tributaries to provide water for irrigation drinking and power generation. The Indira Sagar Dam on the Narmada is one of the largest dams in India and has a massive reservoir behind it. The power sector in Madhya Pradesh has seen significant growth with the state emerging as one of the leading producers of electricity from thermal hydro and solar sources in the country making it energy surplus."}];function mp(r){const i=r.split("");for(let s=i.length-1;s>0;s--){const c=Math.floor(Math.random()*(s+1));[i[s],i[c]]=[i[c],i[s]]}return i.join("")===r?mp(r):i.join("")}const ui="w-full px-4 py-3 rounded-xl border border-blue-800 bg-[#0d1424] text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 transition-all text-base";function Ob({msg:r,color:i}){return r?f.jsx("div",{style:{background:i||"#2563eb"},className:"fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl font-bold text-sm text-white shadow-2xl",children:r}):null}function jb({user:r,view:i,setView:s,onLogout:c}){const d=[{id:"dashboard",icon:Vt,label:"Home"},{id:"mocktest",icon:Fc,label:"Exams"},{id:"stats",icon:sp,label:"Stats"},{id:"games",icon:op,label:"Games"},{id:"pricing",icon:qc,label:"Pro"}],m=typeof i=="object"?i.type:i;return f.jsxs("header",{className:"bg-[#060b16] border-b border-blue-900/50 sticky top-0 z-30",children:[f.jsxs("div",{className:"max-w-6xl mx-auto px-4 h-16 flex items-center justify-between",children:[f.jsxs("button",{onClick:()=>s("dashboard"),className:"flex items-center gap-2",children:[f.jsx("div",{className:"w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-[0_0_14px_rgba(37,99,235,0.6)]",children:f.jsx(cp,{className:"w-5 h-5 text-white"})}),f.jsx("span",{className:"font-black text-lg text-white tracking-tight",children:"TypoMaster"})]}),f.jsx("nav",{className:"hidden md:flex items-center gap-1",children:d.map(p=>f.jsxs("button",{onClick:()=>s(p.id),className:`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold transition-all ${m===p.id?"bg-blue-600/25 text-blue-300 border border-blue-500/40":"text-slate-400 hover:text-white hover:bg-white/5"}`,children:[f.jsx(p.i
